name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --junit-xml=diagnostics/test_results.xml
        env:
          BEAL_Z3_HEAVY: "1"
          COLLATZ_HEAVY: "1"

      - name: Run Omega Report
        run: |
          if [ -f diagnostics/omega_report.py ]; then
            python diagnostics/omega_report.py
          else
            echo "diagnostics/omega_report.py not found; skipping Omega Report."
          fi

      - name: Coherence Guard
        run: |
          python - <<'EOF'
          import xml.etree.ElementTree as ET
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          xml_path = Path("diagnostics/test_results.xml")
          if not xml_path.exists():
              print("No test_results.xml found — skipping coherence guard.")
              raise SystemExit(0)

          tree = ET.parse(xml_path)
          root = tree.getroot()
          suite = root.find("testsuite") if root.tag == "testsuites" else root

          total   = int(suite.get("tests",    0))
          failed  = int(suite.get("failures", 0)) + int(suite.get("errors", 0))
          skipped = int(suite.get("skipped",  0))
          passed  = total - failed - skipped
          rate    = (passed / total * 100) if total > 0 else 0.0

          now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")
          sha = os.getenv("GITHUB_SHA", "local")[:7]

          current = {
              "timestamp": now,
              "sha":       sha,
              "total":     total,
              "passed":    passed,
              "failed":    failed,
              "skipped":   skipped,
              "pass_rate": round(rate, 4),
          }

          print(f"Current run: {passed}/{total} ({rate:.2f}%)")

          history_path = Path("diagnostics/coherence_history.json")
          history = []
          if history_path.exists():
              try:
                  history = json.loads(history_path.read_text())
              except Exception:
                  history = []

          if history:
              last = history[-1]
              if passed < last["passed"]:
                  print(f"COHERENCE REGRESSION: {passed} passed vs {last['passed']} in last run ({last['sha']})")
                  raise SystemExit(1)
              if passed > last["passed"]:
                  print(f"COHERENCE IMPROVEMENT: {last['passed']} -> {passed} passed")
              else:
                  print(f"COHERENCE STABLE: {passed}/{total}")

          history.append(current)
          history = history[-100:]
          history_path.write_text(json.dumps(history, indent=2))
          print(f"History updated: {len(history)} entries")
          EOF

      - name: Publish Omega Diary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python diagnostics/omega_diary_publisher.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Omega artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omega-report
          path: |
            diagnostics/OMEGA_REPORT.md
            diagnostics/test_results.xml
            diagnostics/coherence_history.json
            diagnostics/*.md
          if-no-files-found: warn

      - name: Commit coherence history
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name  "omega-ci"
          git config user.email "omega-ci@villasmil.dev"
          git add diagnostics/coherence_history.json diagnostics/OMEGA_REPORT.md
          git diff --staged --quiet || git commit -m "ci: coherence update $(date -u '+%Y-%m-%d %H:%M') [skip ci]"
          git pull --rebase -X ours origin main
          git push
